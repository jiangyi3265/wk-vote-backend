name: Deploy backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  SERVER_HOST: 101.42.94.41
  SERVER_USER: root
  APP_DIR: /opt/wk-vote/backend
  SERVICE_NAME: wk-vote-backend
  REPO_URL: https://github.com/jiangyi3265/wk-vote-backend.git

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build and activate release
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            APP_DIR="${{ env.APP_DIR }}"
            SERVICE_NAME="${{ env.SERVICE_NAME }}"
            REPO_URL="${{ env.REPO_URL }}"
            SOURCE_DIR="$APP_DIR/source"
            RELEASE_DIR="$APP_DIR/releases/${{ github.sha }}"
            DB_USERNAME="${{ secrets.DB_USERNAME }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"

            retry() {
              for i in 1 2 3 4 5; do
                "$@" && return 0
                echo "retry $i: $*"
                sleep 5
              done
              return 1
            }

            if [ ! -d "$SOURCE_DIR/.git" ]; then
              rm -rf "$SOURCE_DIR"
              retry git clone "$REPO_URL" "$SOURCE_DIR"
            fi
            cd "$SOURCE_DIR"
            retry git fetch origin
            git checkout --force "${{ github.sha }}"
            mvn -B -DskipTests clean package -pl ruoyi-admin -am

            mkdir -p "$RELEASE_DIR" "$APP_DIR/logs" "$APP_DIR/config"
            cp "$SOURCE_DIR/ruoyi-admin/target/ruoyi-admin.jar" "$RELEASE_DIR/app.jar"
            ln -sfn "$RELEASE_DIR/app.jar" "$APP_DIR/app.jar"

            cat > "$APP_DIR/config/application-prod.yml" <<EOF
            ruoyi:
              profile: /opt/wk-vote/backend/uploadPath
            server:
              port: 18080
            spring:
              redis:
                host: 127.0.0.1
                port: 6379
                database: 0
                password:
              datasource:
                druid:
                  master:
                    url: jdbc:mysql://127.0.0.1:3306/ha?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
                    username: ${DB_USERNAME}
                    password: ${DB_PASSWORD}
            EOF

            cat > "/etc/systemd/system/${SERVICE_NAME}.service" <<EOF
            [Unit]
            Description=WK Vote RuoYi Backend
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=${APP_DIR}
            ExecStart=/usr/bin/java -jar ${APP_DIR}/app.jar --spring.profiles.active=druid,prod --spring.config.additional-location=file:${APP_DIR}/config/ --server.port=18080
            Restart=always
            RestartSec=5
            StandardOutput=append:${APP_DIR}/logs/app.log
            StandardError=append:${APP_DIR}/logs/error.log

            [Install]
            WantedBy=multi-user.target
            EOF

            systemctl daemon-reload
            systemctl enable "$SERVICE_NAME"
            systemctl restart "$SERVICE_NAME"
            systemctl --no-pager --full status "$SERVICE_NAME"
